name: Build project executable

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential freeglut3-dev libglu1-mesa-dev libgl1-mesa-dev

      - name: Build final executable
        run: make project

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: projet-imt-project-linux
          path: build/projet-imt-project

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-freeglut

      - name: Build final executable
        shell: msys2 {0}
        run: make project LDFLAGS="-lopengl32 -lglu32 -lfreeglut -lm"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: projet-imt-project-windows
          path: build/projet-imt-project.exe
